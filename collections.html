<!DOCTYPE html>
<html>

<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <title>Collections</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <!-- Custom Cursor -->
    <div class="custom-cursor" id="custom-cursor"></div>

    <!-- NEW NAVBAR -->
    <nav class="new-navbar">
      <!-- Left Section: Menu & Search -->
      <div class="nav-left">
        <button class="nav-icon menu-toggle" id="menuToggle">
          <i class="fa-solid fa-bars"></i>
        </button>
        <button class="nav-icon search-toggle" id="searchToggle">
          <i class="fa-solid fa-magnifying-glass"></i>
        </button>
      </div>

      <!-- Center: Logo -->
      <div class="nav-center">
        <a href="index.html">
          <img src="logo.png" class="logo">
        </a>
      </div>

      <!-- Right Section: Profile & Cart -->
      <div class="nav-right">
        <button class="nav-icon profile-toggle" id="profileToggle">
          <i class="fa-solid fa-user"></i>
        </button>
        <button class="nav-icon" id="cartToggle" onclick="openCart()">
          <i class="fa-solid fa-bag-shopping"></i>
          <span class="cart-badge" id="cart-count">0</span>
        </button>
      </div>
    </nav>

    <!-- SIDEBAR MENU -->
    <div class="sidebar-menu" id="sidebarMenu">
      <div class="sidebar-header">
        <h2>Menu</h2>
        <button class="close-btn" id="closeSidebar">
          <i class="fa-solid fa-times"></i>
        </button>
      </div>
      <div class="sidebar-content">
        <div class="sidebar-section">
          <h3>Categories</h3>
          <a href="floral.html" class="sidebar-link sub-link">Floral Printed Kurtis</a>
          <a href="peplum.html" class="sidebar-link sub-link">Peplum Kurtis</a>
          <a href="kurta sets.html" class="sidebar-link sub-link">Kurta Sets</a>
        </div>
      </div>
    </div>

    <!-- SEARCH PANEL -->
    <div class="search-panel" id="searchPanel">
      <div class="search-header">
        <input type="text" class="search-input" id="searchInput" placeholder="Search products...">
        <button class="search-close" id="searchClose">
          <i class="fa-solid fa-times"></i>
        </button>
      </div>
      <div class="search-results" id="searchResults">
        <!-- Results will populate here -->
      </div>
    </div>

    <!-- PROFILE MODAL -->
    <div class="profile-modal" id="profileModal">
      <div class="modal-content">
        <button class="modal-close" id="profileClose">
          <i class="fa-solid fa-times"></i>
        </button>
        <h2>Sign In</h2>
        <form class="profile-form" id="profileForm">
          <input type="text" placeholder="Full Name" id="userName" required>
          <input type="email" placeholder="Email (optional)" id="userEmail">
          <input type="tel" placeholder="Phone Number (optional)" id="userPhone">
          <div class="error-message" id="loginError"></div>
          <button type="submit" class="login-btn">Login</button>
        </form>
        <div class="or-divider">Or continue as guest</div>
        <button class="guest-btn" onclick="closeProfileModal()">Browse as Guest</button>
      </div>
    </div>

    <!-- Overlay for modals -->
    <div class="modal-overlay" id="modalOverlay"></div>

    <section class="category-page">
        <h1>Our Collections</h1>

        <div class="card-container">

            <a href="floral.html" class="product-link">
                <div class="card">
                    <img src="floral1.jpeg">
                    <h3>Floral Printed Kurtis</h3>
                </div>
            </a>

            <a href="peplum.html" class="product-link">
                <div class="card">
                    <img src="peplum blue.jpeg">
                    <h3>Peplum Kurtis</h3>
                </div>
            </a>

            <a href="kurta sets.html" class="product-link">
                <div class="card">
                    <img src="red set.jpeg">
                    <h3>Kurta Sets</h3>
                </div>
            </a>

        </div>
    </section>
    </div>
    </section>

    <script>
      // Sample products database (add this)
      const allProducts = [
        { id: 1, name: "Floral Whisper Cotton Suit", price: "₹1,699", image: "Floral1.jpeg", category: "floral" },
        { id: 2, name: "Embroidered Black Peplum", price: "₹1,899", image: "peplum black.jpg", category: "peplum" },
        { id: 3, name: "Emerald Green Peplum Top", price: "₹1,599", image: "peplum green.jpg", category: "peplum" },
        { id: 4, name: "Regal Purple Peplum Set", price: "₹1,999", image: "peplum purple.jpg", category: "peplum" },
        { id: 5, name: "Azure Blue Printed Kurti", price: "₹1,299", image: "printed blue.jpg", category: "printed" },
        { id: 6, name: "Crimson Red Daily Wear", price: "₹1,299", image: "printed red.jpg", category: "printed" },
        { id: 7, name: "Pristine White Kurta Set", price: "₹2,499", image: "white (1).jpg", category: "sets" },
        { id: 8, name: "Lavender Floral Kurti", price: "₹899", image: "red.jpeg", category: "floral" },
        { id: 9, name: "Pink Floral Kurti", price: "₹999", image: "pink.jpeg", category: "floral" },
        { id: 10, name: "Blue Cotton Kurti", price: "₹1,199", image: "blue.jpeg", category: "printed" }
      ];

      function renderSearchResults(products) {
        const searchResults = document.getElementById('searchResults');
        
        if (products.length === 0) {
          searchResults.innerHTML = '<p style="text-align: center; color: #999; padding: 40px 20px; grid-column: 1/-1;">No products found</p>';
          return;
        }

        searchResults.innerHTML = products.map(product => `
          <div class="search-product-card">
            <div class="search-card-image">
              <img src="${product.image}" alt="${product.name}" loading="lazy">
            </div>
            <div class="search-card-info">
              <h4>${product.name}</h4>
              <p class="search-card-price">${product.price}</p>
              <button class="search-card-btn" onclick="addToCart('${product.name}')">Add to Cart</button>
            </div>
          </div>
        `).join('');
      }

      // DOM Elements
      const menuToggle = document.getElementById('menuToggle');
      const sidebarMenu = document.getElementById('sidebarMenu');
      const closeSidebar = document.getElementById('closeSidebar');
      const searchToggle = document.getElementById('searchToggle');
      const searchPanel = document.getElementById('searchPanel');
      const searchClose = document.getElementById('searchClose');
      const searchInput = document.getElementById('searchInput');
      const profileToggle = document.getElementById('profileToggle');
      const profileModal = document.getElementById('profileModal');
      const profileClose = document.getElementById('profileClose');
      const modalOverlay = document.getElementById('modalOverlay');

      // Sidebar Menu Toggle
      menuToggle.addEventListener('click', () => {
        sidebarMenu.classList.add('active');
        modalOverlay.classList.add('active');
      });

      closeSidebar.addEventListener('click', () => {
        sidebarMenu.classList.remove('active');
        modalOverlay.classList.remove('active');
      });

      // Close sidebar when clicking on a link
      const sidebarLinks = document.querySelectorAll('.sidebar-link');
      sidebarLinks.forEach(link => {
        link.addEventListener('click', () => {
          sidebarMenu.classList.remove('active');
          modalOverlay.classList.remove('active');
        });
      });

      // Search Panel Toggle
    function openSearch() {
      searchPanel.classList.add('active');
      modalOverlay.classList.add('active');
      searchInput.focus();
      
      // Load default products on open
      setTimeout(() => {
        renderSearchResults(allProducts);
        const resultsContainer = document.getElementById('searchResults');
        if (resultsContainer) resultsContainer.classList.add('grid');
      }, 100);
    }

    function closeSearch() {
      searchPanel.classList.remove('active');
      modalOverlay.classList.remove('active');
      searchInput.value = '';
      renderSearchResults(allProducts);
    }

    searchToggle.addEventListener('click', openSearch);
    searchClose.addEventListener('click', closeSearch);
      // Search input listener with live filtering
      searchInput.addEventListener('input', (e) => {
        const query = e.target.value.trim().toLowerCase();
        
        if (query === '') {
          // Show all products if search is empty
          renderSearchResults(allProducts);
        } else {
          // Filter products based on search query
          const filtered = allProducts.filter(product =>
            product.name.toLowerCase().includes(query) ||
            product.category.toLowerCase().includes(query)
          );
          renderSearchResults(filtered);
        }
        
        document.getElementById('searchResults').classList.add('grid');
      });

      // Profile Modal Functions
      function openProfileModal() {
        profileModal.classList.add('active');
        modalOverlay.classList.add('active');
      }

      function closeProfileModal() {
        profileModal.classList.remove('active');
        modalOverlay.classList.remove('active');
      }

      // Profile Toggle
      profileToggle.addEventListener('click', openProfileModal);
      profileClose.addEventListener('click', closeProfileModal);

      // Profile form submission
      const profileForm = document.querySelector('.profile-form');
      profileForm.addEventListener('submit', (e) => {
        e.preventDefault();
        const name = document.getElementById('userName').value.trim();
        const email = document.getElementById('userEmail').value.trim();
        const phone = document.getElementById('userPhone').value.trim();
        const errorMsg = document.getElementById('loginError');

        // Reset error message
        errorMsg.textContent = '';

        // Validate name
        if (!name) {
          errorMsg.textContent = 'Please enter your name.';
          return;
        }

        // Check if either email or phone is filled
        if (!email && !phone) {
          errorMsg.textContent = 'Please enter Email or Phone Number.';
          return;
        }

        // Login successful
        localStorage.setItem('userProfile', JSON.stringify({ name, email, phone }));
        alert(`Welcome ${name}! Login successful 💜`);
        closeProfileModal();
        profileForm.reset();
      });

// Close modals when clicking overlay (excluding close buttons)
    modalOverlay.addEventListener('click', (e) => {
      if (e.target === modalOverlay) {
        sidebarMenu.classList.remove('active');
        searchPanel.classList.remove('active');
        profileModal.classList.remove('active');
        modalOverlay.classList.remove('active');
      }
      });

      // Cart functionality
      function openCart() {
        alert("Cart page coming soon 🛍");
      }

      function addToCart(product) {
        let cart = JSON.parse(localStorage.getItem("cart")) || [];
        cart.push(product);
        localStorage.setItem("cart", JSON.stringify(cart));
        updateCartCount();
      }

      function updateCartCount() {
        let cart = JSON.parse(localStorage.getItem("cart")) || [];
        document.getElementById("cart-count").innerText = cart.length;
      }

      updateCartCount();

      // Prevent scroll when modal is open
      function toggleBodyScroll(disable) {
        if (disable) {
          document.body.style.overflow = 'hidden';
        } else {
          document.body.style.overflow = 'auto';
        }
      }

      // Update scroll lock when modals change
      const observer = new MutationObserver(() => {
        const anyModalActive = sidebarMenu.classList.contains('active') ||
          searchPanel.classList.contains('active') ||
          profileModal.classList.contains('active');
        toggleBodyScroll(anyModalActive);
      });

      observer.observe(sidebarMenu, { attributes: true });
      observer.observe(searchPanel, { attributes: true });
      observer.observe(profileModal, { attributes: true });
    </script>

    <script>
      // Custom Cursor Logic
      const cursor = document.getElementById('custom-cursor');
      const interactiveElements = document.querySelectorAll('a, button, .card, img[onclick]');

      if (cursor) {
        document.addEventListener('mousemove', (e) => {
          cursor.style.left = e.clientX + 'px';
          cursor.style.top = e.clientY + 'px';
        });

        interactiveElements.forEach(el => {
          el.addEventListener('mouseenter', () => {
            cursor.classList.add('active');
          });
          el.addEventListener('mouseleave', () => {
            cursor.classList.remove('active');
          });
        });
      }
    </script>

</body>

</html>
